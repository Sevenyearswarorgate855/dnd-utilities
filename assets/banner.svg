<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="D20 Tavern banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#110d17"/>
      <stop offset="50%" stop-color="#1a1323"/>
      <stop offset="100%" stop-color="#09070b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe0aa"/>
      <stop offset="50%" stop-color="#f1c277"/>
      <stop offset="100%" stop-color="#a86934"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f1c277" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f1c277" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="840" cy="315" r="190" fill="url(#glow)"/>
  <circle cx="840" cy="315" r="210" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <circle cx="840" cy="315" r="150" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2" stroke-dasharray="8 10"/>
  <polygon points="840,150 970,228 970,402 840,480 710,402 710,228" fill="url(#gold)"/>
  <polygon points="840,178 944,240 944,390 840,452 736,390 736,240" fill="none" stroke="rgba(255,255,255,0.34)" stroke-width="3"/>
  <text x="840" y="346" text-anchor="middle" font-family="Georgia,serif" font-size="112" font-weight="700" fill="#241810">20</text>
  <text x="90" y="190" font-family="Georgia,serif" font-size="78" font-weight="700" fill="#f6f1e8">D20 Tavern</text>
  <text x="90" y="254" font-family="Arial,sans-serif" font-size="28" fill="#c2b3af">Mobile-first fantasy utility for D&amp;D, Baldur's Gate, and RPG sessions</text>
  <text x="90" y="330" font-family="Arial,sans-serif" font-size="24" fill="#f1c277">Quick rolls. Multiplayer duels. Built-in languages. Ready for GitHub.</text>
  <rect x="90" y="390" width="200" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <text x="190" y="423" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#f6f1e8">Mobile-first</text>
  <rect x="308" y="390" width="220" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <text x="418" y="423" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#f6f1e8">Multilingual</text>
  <rect x="546" y="390" width="220" height="52" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <text x="656" y="423" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#f6f1e8">Open source</text>
</svg>
